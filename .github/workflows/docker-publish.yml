name: Docker Build and Publish (main dev builds)

# Phase 8 rewrite: this workflow is now scoped to DEV builds only.
# It fires on every push to main and produces two floating tags on
# GHCR:
#   ghcr.io/<owner>/gpu-monitor:main        — rolling pointer to the
#                                              latest main build
#   ghcr.io/<owner>/gpu-monitor:main-<sha>  — immutable per-commit tag
#
# Official release builds (semver tags, :latest pointer) are
# produced by a separate workflow — see .github/workflows/release.yml
# — which fires on v*.*.* git tags written by release-please.
#
# Docker Hub has been dropped from this repo's publish pipeline.
# The upstream bigsk1/gpu-monitor still publishes there; this fork
# publishes exclusively to GHCR. Users pulling `bigsk1/gpu-monitor`
# from Docker Hub should see the plan's README "Upgrading from the
# upstream fork" section for migration guidance.

on:
  push:
    branches: [ main ]

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # Needed for provenance signing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
          # Dev-build tags:
          #   - `type=ref,event=branch` → `main`
          #   - `type=sha,prefix=main-` → `main-abc1234` (immutable per commit)
          # The rolling `:main` pointer always tracks the latest successful
          # build on the default branch; the `:main-<sha>` immutable tag
          # lets users pin a specific dev build for rollback without
          # depending on the floating pointer.
          tags: |
            type=ref,event=branch
            type=sha,prefix=main-
          labels: |
            org.opencontainers.image.title=GPU Monitor
            org.opencontainers.image.description=Real-time NVIDIA GPU monitoring dashboard
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Read VERSION file
        id: version
        # Reads the tracked VERSION file from the repo (not untrusted input)
        # and exposes it as a step output for the build-args stanza below.
        # For main dev builds, VERSION contains "X.Y.Z-dev" between
        # releases (release-please rewrites it to "X.Y.Z" inside its
        # auto-generated release PR).
        run: |
          printf 'app_version=%s\n' "$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.app_version }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

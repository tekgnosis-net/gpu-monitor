name: Release Please

# Phase 8. Runs on every push to main and opens (or updates) an
# auto-generated release PR that bumps VERSION + CHANGELOG based
# on conventional-commit messages since the last release. When
# the release PR is merged, release-please creates a v*.*.* git
# tag which triggers the release.yml workflow to build and push
# the container image.
#
# Loop:
#   conventional commits on main
#     -> release-please opens a "release-please--branches--main" PR
#     -> human reviews + merges the PR
#     -> release-please creates a v*.*.* tag
#     -> release.yml builds and pushes to GHCR
#
# The first release (1.0.0) is seeded via
# .github/release-please-manifest.json rather than being
# auto-computed from commit history. See the manifest file for
# the initial seeding rationale.
#
# This workflow has no run: shell blocks and no untrusted-input
# interpolation — it is purely a dispatch into the pinned
# release-please-action, which is a well-audited Google action.

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          # Use a PAT instead of the default GITHUB_TOKEN so that
          # release-please can push commits (VERSION bump, CHANGELOG
          # update) and create tags on the protected main branch.
          # The default GITHUB_TOKEN cannot bypass branch protection
          # rules even with `enforce_admins: false` because it is
          # not an admin-scoped token. The PAT is stored as a
          # repository secret with Contents (RW) + Pull requests
          # (RW) permissions scoped to this repository only.
          token: ${{ secrets.RELEASE_PAT }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json
          target-branch: main

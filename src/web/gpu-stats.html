<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time NVIDIA GPU monitoring dashboard with historical data and per-card telemetry">
    <meta name="author" content="github.com/tekgnosis-net">
    <meta name="keywords" content="NVIDIA, GPU, monitoring, dashboard, Docker">

    <title>GPU Monitor</title>

    <!-- Favicon + app icons (assets live alongside this file; the Dockerfile
         flattens src/web/* into /app/ so relative paths resolve at runtime) -->
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link rel="shortcut icon" href="images/favicon.ico">
    <meta name="theme-color" content="#000000">

    <!-- Design tokens, layout, component styles. Loaded in order so the
         cascade works correctly: tokens define the variables, layout uses
         them for the shell, components override per-element. -->
    <link rel="stylesheet" href="styles/tokens.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/components.css">

    <!-- Chart.js 4 via CDN. Phase 4 uses it for the Dashboard history
         chart. Lit is imported via ESM directly from jsDelivr inside the
         component modules themselves — no separate <script> tag needed. -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
    <!-- Sidebar shell — its contents are generated by sidebar.js at
         runtime so the navigation items live in one place. -->
    <aside class="sidebar" aria-label="Main navigation"></aside>

    <!-- Main content area — router mounts views into this container. -->
    <main class="content"></main>

    <!-- App entry point. The `type="module"` attribute means we get
         ES module semantics: imports resolve, top-level await works,
         and each imported module runs once no matter how many other
         modules import it. -->
    <script type="module" src="app.js"></script>
</body>
</html>

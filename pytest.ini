[pytest]
# Phase 3: asyncio_mode=auto lets @pytest_asyncio.fixture coroutines be
# awaited from sync test bodies without the strict-mode ceremony. All of
# tests/test_api.py's async tests pick this up automatically.
asyncio_mode = auto

# Only collect tests from the tests/ tree. The top-level scripts
# (setup.sh, scripts/, src/monitor_gpu.sh, etc.) are not test modules.
testpaths = tests

# Skip the legacy db_load_*_test.py scripts in tests/ — they were
# standalone harnesses that pre-date the pytest harness and would fail
# collection (no test_ functions, live DB writes, etc.). Phase 3
# introduces test_api.py as the first proper pytest module; future
# phases will port the load-test scripts or delete them.
python_files = test_*.py
python_functions = test_*
python_classes = Test*
